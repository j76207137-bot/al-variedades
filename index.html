<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL VARIEDADES</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
background:linear-gradient(90deg,#ff5a00,#ff7a1a);
color:#fff;
text-align:center;
padding:18px;
font-size:24px;
font-weight:800;
}

/* ===== SLIDER ===== */
.slider{
width:100%;
height:420px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* ===== DESCRIÇÃO ===== */
.desc{
text-align:center;
padding:25px;
background:#fff;
}

.desc h2{
font-size:26px;
margin-bottom:8px;
}

/* ===== PRODUTOS ===== */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:#ff5a00;
font-weight:bold;
margin-top:5px;
}

/* ===== BOTÃO ===== */
button{
width:100%;
padding:10px;
background:#25d366;
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ===== RESPONSIVO ===== */
@media(max-width:768px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>
<body>

<header>
AL VARIEDADES
</header>

<!-- ===== SLIDER (4 IMAGENS) ===== -->
<section class="slider">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
</div>

</section>

<!-- ===== DESCRIÇÃO ===== -->
<div class="desc">
<h2>AL VARIEDADES</h2>
<p>Moda moderna, qualidade e preços acessíveis em um só lugar.</p>
</div>

<!-- ===== PRODUTOS ===== -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<div class="card-content">
<p>Camisa Estilosa</p>
<p class="price">R$ 59,90</p>
<button onclick="buy('Camisa Estilosa')">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-6a8b4c5c8f8c">
<div class="card-content">
<p>Tênis Moderno</p>
<p class="price">R$ 129,90</p>
<button onclick="buy('Tênis Moderno')">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975869019-4b8c5c6f7a1b">
<div class="card-content">
<p>Jaqueta Premium</p>
<p class="price">R$ 199,90</p>
<button onclick="buy('Jaqueta Premium')">Comprar</button>
</div>
</div>

</section>

<!-- ===== WHATSAPP ===== -->
<a class="whatsapp" target="_blank"
href="https://wa.me/557599883008?text=Olá!%20vim%20pelo%20site%20AL%20Variedades">
📱
</a>

<script>

/* SLIDER */
let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(){
slides[current].classList.remove('active');
current = (current + 1) % slides.length;
slides[current].classList.add('active');
}

setInterval(nextSlide,3000);

/* WHATSAPP POR PRODUTO */
function buy(product){
let msg = "Olá! quero comprar: " + product;
window.open("https://wa.me/557599883008?text=" + encodeURIComponent(msg), "_blank");
}

</script>

</body>
</html>
