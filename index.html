<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL VARIEDADES - Loja Oficial</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

/* HEADER */
header{
background:linear-gradient(90deg,#ff5a00,#ff7a1a);
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* CATEGORIAS */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#fff;
}

.categories div{
padding:10px 15px;
background:#eee;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

/* PRODUTOS */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:#ff5a00;
font-weight:bold;
margin-top:5px;
}

/* BOTÕES */
button{
width:100%;
padding:10px;
background:#25d366;
color:#fff;
border:none;
font-weight:bold;
cursor:pointer;
}

/* CARRINHO */
.cart{
position:fixed;
top:20px;
right:20px;
width:220px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.cart h3{
margin-bottom:10px;
}

.item{
font-size:13px;
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
text-decoration:none;
}

</style>

</head>
<body>

<header>
AL VARIEDADES
</header>

<!-- CATEGORIAS -->
<div class="categories">
<div onclick="filter('all')">Todos</div>
<div onclick="filter('camisas')">Camisas</div>
<div onclick="filter('tenis')">Tênis</div>
<div onclick="filter('jaquetas')">Jaquetas</div>
</div>

<!-- PRODUTOS -->
<section class="products" id="products">

<div class="card" data-cat="camisas">
<img src="https://picsum.photos/id/1060/400/400">
<div class="card-content">
<p>Camisa Estilosa</p>
<p class="price">R$ 59,90</p>
<button onclick="add('Camisa Estilosa',59.90)">Adicionar</button>
</div>
</div>

<div class="card" data-cat="tenis">
<img src="https://picsum.photos/id/1050/400/400">
<div class="card-content">
<p>Tênis Moderno</p>
<p class="price">R$ 129,90</p>
<button onclick="add('Tênis Moderno',129.90)">Adicionar</button>
</div>
</div>

<div class="card" data-cat="jaquetas">
<img src="https://picsum.photos/id/1040/400/400">
<div class="card-content">
<p>Jaqueta Premium</p>
<p class="price">R$ 199,90</p>
<button onclick="add('Jaqueta Premium',199.90)">Adicionar</button>
</div>
</div>

</section>

<!-- CARRINHO -->
<div class="cart">
<h3>🛒 Carrinho</h3>
<div id="cart"></div>
<hr>
<p id="total">Total: R$ 0</p>
<button onclick="checkout()">Finalizar no WhatsApp</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" target="_blank"
href="https://wa.me/557599883008">
📱
</a>

<script>

let cart = [];
let total = 0;

/* ADICIONAR */
function add(name, price){
cart.push({name, price});
total += price;
render();
}

/* RENDER CARRINHO */
function render(){
let box = document.getElementById("cart");
box.innerHTML = "";

cart.forEach((item,i)=>{
box.innerHTML += `
<div class="item">
${item.name}
<span>R$ ${item.price}</span>
</div>
`;
});

document.getElementById("total").innerText =
"Total: R$ " + total.toFixed(2);
}

/* CHECKOUT WHATSAPP */
function checkout(){

let msg = "Olá! quero comprar:%0A";

cart.forEach(i=>{
msg += "- " + i.name + " R$ " + i.price + "%0A";
});

msg += "%0ATotal: R$ " + total.toFixed(2);

window.open("https://wa.me/557599883008?text=" + msg, "_blank");
}

/* FILTRO */
function filter(cat){

let cards = document.querySelectorAll(".card");

cards.forEach(c=>{
if(cat === "all"){
c.style.display = "block";
}else{
c.style.display = c.dataset.cat === cat ? "block" : "none";
}
});

}

</script>

</body>
</html>
