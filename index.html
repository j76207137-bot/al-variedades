<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL VARIEDADES</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

/* HEADER */
header{
background:#ff6600;
padding:15px;
color:#fff;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* SLIDER */
.slider{
width:100%;
height:450px;
position:relative;
overflow:hidden;
}

.slides{
width:100%;
height:100%;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* DESCRIÇÃO */
.banner-desc{
text-align:center;
padding:30px 20px;
background:#fff;
}

.banner-desc h2{
font-size:28px;
margin-bottom:10px;
}

.banner-desc p{
color:#666;
font-size:16px;
line-height:1.6;
}

/* PRODUTOS */
.product-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:#ff6600;
font-weight:bold;
}

/* BOTÃO */
button{
width:100%;
padding:10px;
background:#25d366;
color:#fff;
border:none;
cursor:pointer;
font-weight:bold;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>
<body>

<header>
AL VARIEDADES
</header>

<!-- SLIDER (4 IMAGENS) -->
<section class="slider">

<div class="slides">

<div class="slide active">
<img src="https://picsum.photos/id/1011/1600/900">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1015/1600/900">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1025/1600/900">
</div>

<!-- +1 IMAGEM -->
<div class="slide">
<img src="https://picsum.photos/id/1035/1600/900">
</div>

</div>

</section>

<!-- DESCRIÇÃO -->
<div class="banner-desc">

<h2>AL VARIEDADES</h2>

<p>
Moda moderna, qualidade e preços acessíveis em um só lugar.
Produtos selecionados com estilo, conforto e ótimo custo-benefício para o seu dia a dia.
</p>

</div>

<!-- PRODUTOS -->
<section class="product-grid">

<div class="card">
<img src="https://picsum.photos/id/1060/400/400">
<div class="card-content">
<p>Produto 1</p>
<p class="price">R$ 59,90</p>
<button onclick="buy('Produto 1')">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/id/1050/400/400">
<div class="card-content">
<p>Produto 2</p>
<p class="price">R$ 79,90</p>
<button onclick="buy('Produto 2')">Comprar</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/id/1040/400/400">
<div class="card-content">
<p>Produto 3</p>
<p class="price">R$ 99,90</p>
<button onclick="buy('Produto 3')">Comprar</button>
</div>
</div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" target="_blank"
href="https://wa.me/557599883008?text=Olá!%20vim%20pelo%20site%20AL%20Variedades">
📱
</a>

<script>

let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(){
slides[current].classList.remove('active');
current = (current + 1) % slides.length;
slides[current].classList.add('active');
}

setInterval(nextSlide,3000);

function buy(product){
let msg = "Olá! quero comprar: " + product;
window.open("https://wa.me/557599883008?text=" + encodeURIComponent(msg), "_blank");
}

</script>

</body>
</html>
