<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL VARIEDADES</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

/* HEADER */
header{
background:#ff5a00;
padding:15px;
color:#fff;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* CATEGORIAS */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#fff;
}

.categories div{
padding:10px 15px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:14px;
}

/* SLIDER */
.slider{
width:100%;
height:420px;
overflow:hidden;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* DESCRIÇÃO */
.banner-desc{
text-align:center;
padding:25px;
background:#fff;
}

.banner-desc h2{
font-size:26px;
margin-bottom:10px;
}

/* PRODUTOS */
.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:#ff5a00;
font-weight:bold;
}

/* BOTÃO */
.btn{
display:block;
text-align:center;
padding:10px;
background:#25d366;
color:#fff;
text-decoration:none;
margin:10px;
border-radius:8px;
}

/* CARRINHO */
.cart{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:#fff;
text-decoration:none;
}

/* RESPONSIVO */
@media(max-width:768px){
.products{
grid-template-columns:repeat(2,1fr);
}
}

</style>

</head>
<body>

<header>
AL VARIEDADES
</header>

<!-- CATEGORIAS -->
<div class="categories">
<div>Todos</div>
<div>Masculino</div>
<div>Feminino</div>
<div>Infantil</div>
<div>Promoções</div>
</div>

<!-- SLIDER -->
<section class="slider">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=1600">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1600">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1600">
</div>

</section>

<!-- DESCRIÇÃO -->
<div class="banner-desc">
<h2>AL VARIEDADES</h2>
<p>Moda moderna, qualidade e preço baixo em um só lugar.</p>
</div>

<!-- PRODUTOS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<div class="card-content">
<p>Camisa Estilosa</p>
<p class="price">R$ 59,90</p>
<a class="btn" href="https://wa.me/55759999883008?text=Quero%20a%20Camisa%20Estilosa">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-6a8b4c5c8f8c">
<div class="card-content">
<p>Tênis Moderno</p>
<p class="price">R$ 129,90</p>
<a class="btn" href="https://wa.me/55759999883008?text=Quero%20o%20Tênis%20Moderno">Comprar</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975869019-4b8c5c6f7a1b">
<div class="card-content">
<p>Jaqueta Premium</p>
<p class="price">R$ 199,90</p>
<a class="btn" href="https://wa.me/55759999883008?text=Quero%20a%20Jaqueta%20Premium">Comprar</a>
</div>
</div>

</section>

<!-- CARRINHO SIMPLES -->
<div class="cart">
🛒 Carrinho (em breve)
</div>

<!-- WHATSAPP -->
<a class="whatsapp" target="_blank"
href="https://wa.me/55759999883008?text=Olá!%20vim%20pelo%20site%20AL%20Variedades">
📱
</a>

<script>

/* SLIDER */
let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(){
slides[current].classList.remove('active');
current = (current + 1) % slides.length;
slides[current].classList.add('active');
}

setInterval(nextSlide,3000);

</script>

</body>
</html>
