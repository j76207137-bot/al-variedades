<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL VARIEDADES</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
overflow-x:hidden;
}

/* HEADER */
header{
background:linear-gradient(90deg,#ff5a00,#ff7a1a);
padding:18px;
text-align:center;
color:#fff;
font-size:24px;
font-weight:800;
}

/* CATEGORIAS */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:#fff;
}

.categories div{
padding:10px 15px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:14px;
}

/* SLIDER */
.slider{
width:100%;
height:420px;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

/* PRODUTOS */
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-content{
padding:10px;
}

.price{
color:#ff5a00;
font-weight:bold;
}

/* BOTÃO */
button{
width:100%;
padding:10px;
background:#25d366;
color:#fff;
border:none;
cursor:pointer;
font-weight:bold;
border-radius:8px;
}

/* CARRINHO */
.cart{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:200px;
}

.cart h4{
margin-bottom:10px;
}

.cart-item{
font-size:13px;
margin-bottom:5px;
display:flex;
justify-content:space-between;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
background:#25d366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#fff;
text-decoration:none;
}

</style>

</head>
<body>

<header>
AL VARIEDADES
</header>

<!-- CATEGORIAS -->
<div class="categories">
<div>Todos</div>
<div>Masculino</div>
<div>Feminino</div>
<div>Infantil</div>
<div>Promoções</div>
</div>

<!-- SLIDER 4 IMAGENS -->
<section class="slider">

<div class="slide active">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
</div>

</section>

<!-- PRODUTOS -->
<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<div class="card-content">
<p>Camisa Estilosa</p>
<p class="price">R$ 59,90</p>
<button onclick="add('Camisa Estilosa - 59,90')">Adicionar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975958225-6a8b4c5c8f8c">
<div class="card-content">
<p>Tênis Moderno</p>
<p class="price">R$ 129,90</p>
<button onclick="add('Tênis Moderno - 129,90')">Adicionar</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1520975869019-4b8c5c6f7a1b">
<div class="card-content">
<p>Jaqueta Premium</p>
<p class="price">R$ 199,90</p>
<button onclick="add('Jaqueta Premium - 199,90')">Adicionar</button>
</div>
</div>

</section>

<!-- CARRINHO -->
<div class="cart">
<h4>🛒 Carrinho</h4>
<div id="cart"></div>
<button onclick="sendWhats()">Comprar no WhatsApp</button>
</div>

<!-- WHATSAPP FLUTUANTE -->
<a class="whatsapp" target="_blank"
href="https://wa.me/5575999883008">
📱
</a>

<script>

let slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide(){
slides[current].classList.remove('active');
current = (current + 1) % slides.length;
slides[current].classList.add('active');
}

setInterval(nextSlide,3000);

/* CARRINHO */
let cart = [];

function add(item){
cart.push(item);
render();
}

function render(){
let box = document.getElementById("cart");
box.innerHTML = "";

cart.forEach((item, index)=>{
box.innerHTML += `<div class="cart-item">
${item}
<span onclick="removeItem(${index})">❌</span>
</div>`;
});
}

function removeItem(i){
cart.splice(i,1);
render();
}

/* ENVIAR WHATSAPP */
function sendWhats(){

let msg = "Olá! quero comprar:%0A";

cart.forEach(i=>{
msg += "- " + i + "%0A";
});

window.open("https://wa.me/5575999883008?text=" + msg, "_blank");
}

</script>

</body>
</html>
